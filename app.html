<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KACOSA · App</title>
</head>
<body>
  <h1>Bienvenido al Panel de Abastecimiento</h1>
  <p>Usuario: <span id="usuario-actual">Cargando...</span></p>
  <button id="btn-logout">Cerrar Sesión</button>

  <script type="module">
    import { protegerPagina, cerrarSesion } from "./js/auth.js";
    
    // Ejecuta la protección de ruta al cargar
    protegerPagina();

    // Evento para cerrar sesión
    document.getElementById("btn-logout").addEventListener("click", () => {
      cerrarSesion();
    });
  </script>
</body>
</html>
