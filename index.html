<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KACOSA · Abastecimiento</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/loader.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="barra"></div>
        <div>
          <h1>KACOSA</h1>
          <p class="sub">Análisis de Abastecimiento</p>
        </div>
      </div>

      <!-- FORM LOGIN -->
      <form id="form-login">
        <label for="login-email">📧 Correo electrónico</label>
        <input type="email" id="login-email" placeholder="tu@correo.com" required>
        
        <label for="login-password">🔒 Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
        
        <button type="submit" class="btn-primario">Iniciar sesión</button>
      </form>

      <div class="divisor">o</div>
      
      <button id="btn-google" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.20455C17.64 8.56636 17.5827 7.95273 17.4764 7.36364H9V10.845H13.8436C13.635 11.97 13.0009 12.9232 12.0477 13.5614V15.8195H14.9564C16.6582 14.2527 17.64 11.9455 17.64 9.20455Z" fill="#4285F4"/>
          <path d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5614C11.2418 14.1014 10.2109 14.4205 9 14.4205C6.65591 14.4205 4.67182 12.8373 3.96409 10.71H0.957275V13.0418C2.43818 15.9832 5.48182 18 9 18Z" fill="#34A853"/>
          <path d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.83 3.96409 7.29V4.95818H0.957275C0.347727 6.17318 0 7.54773 0 9C0 10.4523 0.347727 11.8268 0.957275 13.0418L3.96409 10.71Z" fill="#FBBC05"/>
          <path d="M9 3.57955C10.3214 3.57955 11.5077 4.03364 12.4405 4.92545L15.0218 2.34409C13.4632 0.891818 11.4259 0 9 0C5.48182 0 2.43818 2.01682 0.957275 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z" fill="#EA4335"/>
        </svg>
        Continuar con Google
      </button>

      <div id="mensaje-error"></div>

      <p class="toggle-form">¿No tienes cuenta? <a id="ir-registro" href="#">Regístrate</a></p>

      <!-- FORM REGISTRO (oculto por defecto) -->
      <form id="form-registro" class="oculto">
        <label for="reg-email">📧 Correo electrónico</label>
        <input type="email" id="reg-email" placeholder="tu@correo.com" required>
        
        <label for="reg-password">🔒 Contraseña</label>
        <input type="password" id="reg-password" placeholder="••••••••" required>
        
        <label for="reg-password2">✅ Confirmar contraseña</label>
        <input type="password" id="reg-password2" placeholder="••••••••" required>
        
        <button type="submit" class="btn-primario">Crear cuenta</button>
        
        <p class="toggle-form"><a id="ir-login" href="#">Volver a iniciar sesión</a></p>
      </form>
    </div>
  </div>
  
  <script type="module" src="js/auth.js"></script>
  <script>
    document.getElementById("ir-registro").onclick = (e) => {
      e.preventDefault();
      document.getElementById("form-login").classList.add("oculto");
      document.getElementById("form-registro").classList.remove("oculto");
    };
    document.getElementById("ir-login").onclick = (e) => {
      e.preventDefault();
      document.getElementById("form-registro").classList.add("oculto");
      document.getElementById("form-login").classList.remove("oculto");
    };
  </script>
</body>
</html>
