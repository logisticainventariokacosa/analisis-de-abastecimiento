<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KACOSA · Abastecimiento</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="barra"></div>
        <div>
          <h1>KACOSA</h1>
          <p class="sub">Análisis de Abastecimiento</p>
        </div>
      </div>

      <!-- FORM LOGIN -->
      <form id="form-login">
        <label for="login-email">Correo</label>
        <input type="email" id="login-email" required>
        <label for="login-password">Contraseña</label>
        <input type="password" id="login-password" required>
        <button type="submit" class="btn-primario">Entrar</button>
      </form>

      <div class="divisor">o</div>
      <button id="btn-google" class="btn-google">Continuar con Google</button>

      <div id="mensaje-error"></div>

      <p class="toggle-form">¿No tienes cuenta? <a id="ir-registro" href="#">Regístrate</a></p>

      <!-- FORM REGISTRO (oculto por defecto) -->
      <form id="form-registro" class="oculto">
        <label for="reg-email">Correo</label>
        <input type="email" id="reg-email" required>
        <label for="reg-password">Contraseña</label>
        <input type="password" id="reg-password" required>
        <label for="reg-password2">Confirmar contraseña</label>
        <input type="password" id="reg-password2" required>
        <button type="submit" class="btn-primario">Crear cuenta</button>
        <p class="toggle-form"><a id="ir-login" href="#">Volver a iniciar sesión</a></p>
      </form>
    </div>
  </div>
  <script>
  window.addEventListener('error', function(e) {
    const el = document.getElementById('mensaje-error');
    if (el) {
      el.textContent = 'Error técnico: ' + (e.message || 'revisa consola') + ' | archivo: ' + (e.filename || '?');
      el.style.display = 'block';
    }
  });
</script>

  <script type="module" src="js/auth.js"></script>
  <script>
    document.getElementById("ir-registro").onclick = (e) => {
      e.preventDefault();
      document.getElementById("form-login").classList.add("oculto");
      document.getElementById("form-registro").classList.remove("oculto");
    };
    document.getElementById("ir-login").onclick = (e) => {
      e.preventDefault();
      document.getElementById("form-registro").classList.add("oculto");
      document.getElementById("form-login").classList.remove("oculto");
    };
  </script>
</body>
</html>
